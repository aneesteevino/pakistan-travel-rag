name: Pakistan Travel RAG CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', 3.11]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
    
    - name: Test configuration loading
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from src.config import GROQ_MODEL, LLM_PROVIDER, TOP_K
        print(f'Model: {GROQ_MODEL}')
        print(f'Provider: {LLM_PROVIDER}')
        print(f'Top K: {TOP_K}')
        print('✅ Configuration loaded successfully')
        "
    
    - name: Test data loading
      run: |
        python -c "
        import sys, os
        sys.path.insert(0, '.')
        from src.data_loader import get_dataset_stats
        stats = get_dataset_stats()
        print(f'Found {len(stats)} datasets')
        for name, info in stats.items():
            if 'rows' in info:
                print(f'  {name}: {info[\"rows\"]} rows')
        print('✅ Data loading test passed')
        "
    
    - name: Test imports
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        try:
            from src.generator import generate_answer
            from src.retriever import get_retriever  
            from src.vector_store import get_vector_store
            from src.itinerary import build_itinerary
            print('✅ All imports successful')
        except ImportError as e:
            print(f'❌ Import error: {e}')
            sys.exit(1)
        "

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run security scan with bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/
    
    - name: Check for known security vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check --json --output safety-report.json || true
        safety check

  lint-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Lint markdown files
      uses: articulate/actions-markdownlint@v1
      with:
        config: .markdownlint.json
        files: '*.md'
        ignore: 'node_modules'
        version: latest